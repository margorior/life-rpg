<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0F1114" />
<title>Life RPG</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="icons/icon-192.png" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0F1114; --panel: #16191F; --panel2: #1C2028; --line: #2A2F38;
    --text: #E9ECF1; --muted: #8B94A3; --faint: #565E6B;
    --acc: #F2A33C; --acc2: #FFC46B; --green: #58C97B; --red: #E5604F;
    --blue: #4FA3E3; --cyan: #4FC8D8; --purple: #A784E8; --pink: #E86E9A;
    --gold: #E8B94A; --teal: #4FCFA8; --orange: #ED8A4C; --steel: #93A8C4;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; min-height: 100vh; color: var(--text); background: var(--bg);
    background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 100% 3px;
    font-family: 'Barlow', system-ui, sans-serif; font-size: 15px;
    padding-bottom: calc(78px + env(safe-area-inset-bottom));
  }
  h1,h2,h3,.rj { font-family: 'Rajdhani', sans-serif; }
  button, input, select { font-family: 'Barlow', sans-serif; }

  header {
    padding: 12px 16px 12px; position: sticky; top: 0; z-index: 10;
    background: rgba(15,17,20,0.96); backdrop-filter: blur(6px);
    border-bottom: 2px solid var(--line);
  }
  .hdr-top { display: flex; align-items: center; gap: 12px; }
  .insignia { flex-shrink: 0; }
  .lvl-eyebrow { font-family:'Rajdhani'; font-size: 12px; letter-spacing: 3px; color: var(--acc); font-weight: 700; }
  .lvl-title { font-family:'Rajdhani'; font-size: 24px; font-weight: 700; color: #fff; letter-spacing: 1.5px; text-transform: uppercase; line-height: 1; margin-top: 2px; }
  .barline { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; }
  .barline .lb { font-family:'Rajdhani'; font-size: 12px; letter-spacing: 3px; color: var(--muted); font-weight: 600; }
  .barline .val { font-family:'Rajdhani'; font-size: 15px; font-weight: 700; color: var(--acc2); letter-spacing: 1px; }
  .xpbar { height: 7px; background: #0A0C0F; border: 1px solid var(--line); margin-top: 4px; overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 100%, 0 100%); }
  .xpbar > div { height: 100%; background: linear-gradient(90deg, var(--acc), var(--acc2)); transition: width .5s ease; }
  .gate-lock { margin-top: 7px; font-size: 12.5px; color: var(--red); display: flex; align-items: center; gap: 6px; letter-spacing: .3px; }

  main { padding: 14px 14px 24px; max-width: 580px; margin: 0 auto; }

  .card {
    background: var(--panel); border: 1px solid var(--line); margin-bottom: 12px;
    clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
    padding: 13px 15px;
  }
  .card-head { display: flex; align-items: center; gap: 9px; margin-bottom: 10px; }
  .card-tag { width: 4px; height: 18px; background: var(--acc); flex-shrink: 0; }
  .card-title { font-family:'Rajdhani'; font-size: 15px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #fff; }
  .card-head .count {
    margin-left: auto; font-family:'Rajdhani'; font-weight: 700; font-size: 13px; letter-spacing: 1px;
    padding: 2px 9px; background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
  }
  .card-head .count.ok { color: var(--green); border-color: rgba(88,201,123,.4); }

  .focus-grid { display: flex; text-align: center; padding: 4px 0 2px; }
  .focus-grid > div { flex: 1; border-right: 1px solid var(--line); }
  .focus-grid > div:last-child { border-right: none; }
  .focus-num { font-family:'Rajdhani'; font-size: 30px; font-weight: 700; line-height: 1; }
  .focus-num small { font-size: 16px; color: var(--muted); font-weight: 600; }
  .focus-lb { font-family:'Rajdhani'; font-size: 11px; color: var(--muted); letter-spacing: 2.5px; text-transform: uppercase; margin-top: 4px; font-weight: 600; }

  .task { display: flex; align-items: center; gap: 12px; padding: 10px 2px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .task:last-child { border-bottom: none; }
  .task.done { opacity: .5; } .task.inactive { opacity: .38; cursor: default; }
  .task .name { font-size: 15px; font-weight: 500; }
  .task.done .name { text-decoration: line-through; }
  .task .meta { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .check {
    width: 22px; height: 22px; border: 2px solid; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-size: 13px; font-weight: 800;
    clip-path: polygon(4px 0, 100% 0, 100% calc(100% - 4px), calc(100% - 4px) 100%, 0 100%, 0 4px);
  }
  .xp-badge { font-family:'Rajdhani'; font-size: 15px; font-weight: 700; color: var(--acc2); margin-left: auto; letter-spacing: .5px; white-space: nowrap; }
  .xp-badge.done { color: var(--green); }

  .btn-row { display: flex; gap: 10px; margin-top: 2px; }
  .btn { font-family:'Rajdhani'; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; font-size: 14px;
    padding: 12px 16px; cursor: pointer; border: none;
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px); }
  .btn-primary { flex: 1; background: var(--acc); color: #1A1206; }
  .btn-primary:active { background: var(--acc2); }
  .btn-ghost { background: var(--panel2); border: 1px solid var(--line); color: var(--muted);
    clip-path: none; }
  .btn-del { background: rgba(229,96,79,.12); border: 1px solid rgba(229,96,79,.45); color: var(--red); width: 30px; height: 30px; font-size: 14px; cursor: pointer; margin-left: auto; }

  .form input, .form select {
    width: 100%; background: #0C0E11; border: 1px solid var(--line);
    color: var(--text); font-size: 15px; padding: 11px 12px; outline: none;
  }
  .form input:focus, .form select:focus { border-color: var(--acc); }
  .form input::placeholder { color: var(--faint); }
  .row { display: flex; gap: 8px; margin-top: 10px; }
  .toggle { flex: 1; background: #0C0E11; border: 1px solid var(--line); color: var(--muted);
    font-family:'Rajdhani'; font-weight: 600; letter-spacing: 1px; font-size: 13px; text-transform: uppercase;
    padding: 10px 4px; cursor: pointer; }
  .toggle.on { border-color: var(--acc); color: var(--acc); background: rgba(242,163,60,.07); }
  .daychip { width: 40px; height: 40px; background: #0C0E11; border: 1px solid var(--line); color: var(--muted);
    font-family:'Rajdhani'; font-weight: 700; font-size: 15px; cursor: pointer; }
  .daychip.on { border-color: var(--acc); color: #1A1206; background: var(--acc); }
  .hint { font-size: 12.5px; color: var(--muted); margin-top: 10px; line-height: 1.5; }

  .avatar-box {
    position: relative; display: flex; justify-content: center; padding: 10px 0 4px;
    background: radial-gradient(ellipse at 50% 40%, #1B212C 0%, var(--panel) 72%);
  }
  .avatar-box svg { animation: breathe 3.2s ease-in-out infinite; transform-origin: 50% 85%; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.012); } }
  @media (prefers-reduced-motion: reduce) { .avatar-box svg { animation: none; } }
  .hero-title { font-family:'Rajdhani'; font-size: 24px; font-weight: 700; color: #fff; text-align: center; text-transform: uppercase; letter-spacing: 2px; margin-top: 6px; }
  .hero-sub { font-size: 12.5px; color: var(--muted); text-align: center; margin: 3px 0 0; letter-spacing: .5px; }

  .radar-wrap { display: flex; justify-content: center; }
  .radar-legend { font-size: 13px; color: var(--muted); margin-top: 6px; text-align: center; }
  .radar-legend b { color: var(--text); font-weight: 600; }

  .stat { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .stat:last-child { border-bottom: none; }
  .stat .icon { width: 26px; font-size: 16px; text-align: center; }
  .stat .top { display: flex; justify-content: space-between; font-size: 13.5px; margin-bottom: 4px; }
  .stat .top .nm { font-family:'Rajdhani'; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
  .stat .top .rk { font-family:'Rajdhani'; font-weight: 700; letter-spacing: .5px; }
  .statbar { height: 6px; background: #0A0C0F; border: 1px solid var(--line); overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 100%, 0 100%); }
  .statbar > div { height: 100%; }
  .substat { display: flex; justify-content: space-between; padding: 3px 0 3px 38px; font-size: 12.5px; color: var(--muted); }

  .routine-head { display: flex; align-items: center; gap: 8px; }
  .routine-status { margin-left: auto; font-family:'Rajdhani'; font-size: 12px; font-weight: 700; letter-spacing: 1.5px; }

  .logrow { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .logrow .when { font-size: 11.5px; color: var(--faint); }
  .logxp { font-family:'Rajdhani'; font-weight: 700; font-size: 15px; }

  nav {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; z-index: 20; gap: 4px;
    background: rgba(15,17,20,0.97); border-top: 2px solid var(--line);
    padding: 7px 8px calc(7px + env(safe-area-inset-bottom));
  }
  nav button { flex: 1; background: none; border: none; padding: 7px 0 6px; cursor: pointer; color: var(--faint); position: relative; }
  nav button.on { color: var(--acc); }
  nav button.on::before { content:""; position: absolute; top: -9px; left: 20%; right: 20%; height: 2px; background: var(--acc); }
  nav .ico { font-size: 19px; } nav .lb { font-family:'Rajdhani'; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }

  #overlay { position: fixed; inset: 0; background: rgba(5,7,9,0.9); z-index: 50; display: none; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  .levelup {
    background: var(--panel); border: 1px solid var(--acc); padding: 32px 44px; text-align: center;
    clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px);
    box-shadow: 0 0 70px rgba(242,163,60,0.25);
  }

  .hdr-top { position: relative; }
  .hdr-actions { position: absolute; right: 0; top: 0; display: flex; gap: 6px; }
  .hdr-actions button {
    width: 36px; height: 36px; background: var(--panel2); border: 1px solid var(--line);
    color: var(--muted); font-size: 16px; cursor: pointer;
  }
  .pause-banner {
    margin-top: 8px; padding: 8px 10px; background: rgba(242,163,60,.08);
    border: 1px solid rgba(242,163,60,.45); font-size: 12.5px; color: var(--acc2);
    display: flex; align-items: center; gap: 8px;
  }
  .pause-banner button { margin-left: auto; background: var(--acc); border: none; color: #1A1206;
    font-family: 'Rajdhani'; font-weight: 700; font-size: 12px; letter-spacing: 1px; padding: 5px 10px; cursor: pointer; }
  #modal { position: fixed; inset: 0; background: rgba(5,7,9,0.9); z-index: 55; display: none; align-items: flex-end; justify-content: center; }
  #modal.show { display: flex; }
  .modal-card {
    background: var(--panel); border: 1px solid var(--line); border-bottom: none; width: 100%; max-width: 580px;
    max-height: 82vh; overflow-y: auto; padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
  }
  .modal-title { font-family:'Rajdhani'; font-size: 17px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: #fff; display:flex; align-items:center; gap:10px; margin-bottom: 6px; }
  .modal-title .x { margin-left: auto; background: var(--panel2); border: 1px solid var(--line); color: var(--muted); width: 32px; height: 32px; font-size: 14px; cursor: pointer; }
  .chip { display: inline-block; font-family:'Rajdhani'; font-weight: 700; font-size: 12px; letter-spacing: 1px;
    padding: 5px 12px; background: #0C0E11; border: 1px solid var(--line); color: var(--muted); cursor: pointer; margin-right: 6px; }
  .chip.on { border-color: var(--acc); color: var(--acc); background: rgba(242,163,60,.07); }
  .status-chip { font-family:'Rajdhani'; font-weight: 700; font-size: 11px; letter-spacing: 1px; padding: 2px 8px; border: 1px solid; white-space: nowrap; }
  .mini-btn { width: 30px; height: 30px; background: var(--panel2); border: 1px solid var(--line); color: var(--muted); font-size: 13px; cursor: pointer; flex-shrink: 0; }
  .goal-bar { height: 8px; background: #0A0C0F; border: 1px solid var(--line); overflow: hidden;
    clip-path: polygon(0 0, calc(100% - 5px) 0, 100% 100%, 0 100%); }
  .goal-bar > div { height: 100%; background: linear-gradient(90deg, var(--acc), var(--acc2)); }
  .quickadd { display: flex; gap: 8px; }
  .quickadd input { flex: 1; background: #0C0E11; border: 1px solid var(--line); color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; }
  .quickadd select { background: #0C0E11; border: 1px solid var(--line); color: var(--text); font-size: 13px; padding: 10px 8px; outline: none; max-width: 130px; }


  .quickadd { flex-wrap: wrap; }
  .quickadd > * { min-width: 0; }
  .quickadd input { flex: 1 1 150px; }
  .quickadd select { flex: 0 1 auto; max-width: 118px; }
  .quickadd .mini-btn, .quickadd button { flex: 0 0 40px; }
  .row > * { min-width: 0; }
  .row select { max-width: 140px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 14px; }

</style>
</head>
<body>
  <header id="header"></header>
  <main id="main"></main>
  <nav id="nav"></nav>
  <div id="overlay"></div>
  <div id="modal"></div>
  <input type="file" id="import-file" accept=".json,application/json" style="display:none" />
  <script type="module" src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
